name: "Check for newer image versions"

on:
  workflow_dispatch:
  schedule:
    # At the end of every day
    - cron: "0 0 * * *"

jobs:

  digest-update-chainguard-25:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: navikt/digestabot@3302a753e533ceb9ec216de7f78345436cd636e3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          team: k9saksbehandling
          working-dir: "java/chainguard-25"
          branch-for-pr: "update-chainguard-25-image"
          title-for-pr: "Update Chainguard 25 image"
